function hexToRgbA(hex, alpha){
  let c;
  if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
      c= hex.substring(1).split('');
      if(c.length== 3){
          c= [c[0], c[0], c[1], c[1], c[2], c[2]];
      }
      c= '0x' + c.join('');
      return 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+','+alpha+')';
  }
  return hex;
}

function opt(i){const f=FR[i];

      borderRadius:[0, 8, 8, 0],
      shadowBlur: 10,

   grid:{left:180,right:100,top:75,bottom:40},
   title:{

   },
   yAxis:{

     axisTick:{show:false}
   },

     data:items,
     label:{
       show:true,
       position:'right',
       valueAnimation:true,
       formatter:p=>p.value+'%',
       color:'#F1F5F9',
       fontFamily:'Inter',
       fontWeight:600,
       fontSize:13
     }
   }],
   graphic:{elements:[{
     type:'text',
     right:60,
     bottom:40,
     style:{
       text:f.ver,
       fontSize:110,
       fontWeight:900,
       fontFamily:'Outfit, sans-serif',
       fill:'rgba(255,255,255,0.035)'
     }
   }]},
   animationDuration:300,
   animationDurationUpdate:900,
   animationEasing:'cubicOut',
   animationEasingUpdate:'linear'};}
let i=0; chart.setOption(opt(0)); setTimeout(()=>chart.resize(),80);
const timer=setInterval(()=>{i=(i+1)%FR.length; chart.setOption(opt(i));},1200);
